<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Chrome - Sign In</title>
  <link rel="icon" type="image/png" href="Asset/icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-image: url('Asset/bg.jpg') !important;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #e8eaed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .chrome-prompt { text-align: center; width: 100%; max-width: 960px; padding: 20px; }
    .chrome-avatar-lg img { width: 80px; height: 80px; margin-bottom: 20px; }
    .chrome-prompt h1 { font-size: 36px; font-weight: 400; color: #fff; margin-bottom: 8px; }
    .chrome-prompt .subtitle { color: #9aa0a6; font-size: 16px; margin-bottom: 48px; }

    .features-grid { display: flex; justify-content: center; align-items: flex-start; gap: 20px; margin-bottom: 60px; }
    .feature-card {
      background: #3c4043;
      width: 250px;
      min-height: 180px;
      padding: 18px 20px;
      border-radius: 24px;
      text-align: center;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    }
    .features-grid .feature-card:last-child { width: 220px; }
    .feat-photo { width: 44px; height: 44px; object-fit: cover; border-radius: 6px; margin-bottom: 14px; }
    .feature-card h3 { font-size: 15px; font-weight: 500; color: #ffffff; margin-bottom: 8px; }
    .feature-card p { font-size: 12px; color: #bdc1c6; line-height: 1.5; }

    .action-footer { position: fixed; bottom: 24px; right: 24px; display: flex; gap: 12px; align-items: center; }
  </style>
</head>
<body>

  <div class="chrome-prompt">
    <div class="chrome-avatar-lg">
      <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Google_Chrome_icon_%28February_2022%29.svg" alt="Chrome">
    </div>
    <h1>Sign in to Chrome</h1>
    <p class="subtitle">Get additional features</p>

    <div class="features-grid">
      <div class="feature-card">
        <img class="feat-photo" src="Asset/t1.png" alt="Devices">
        <h3>All your devices</h3>
        <p>Easily pick up where you left off</p>
      </div>
      <div class="feature-card">
        <img class="feat-photo" src="Asset/t3.png" alt="Security">
        <h3>Stronger security</h3>
        <p>Protect your passwords against phishing</p>
      </div>
      <div class="feature-card">
        <img class="feat-photo" src="Asset/t2.png" alt="Backup">
        <h3>Back up your stuff</h3>
        <p>Save your bookmarks and more with sync</p>
      </div>
    </div>

    <div class="action-footer">
      <button id="btnToLogin"
  style="background-color:#a8c7fa !important;color:#062e6f !important;border:none;padding:10px 16px;min-width:130px;border-radius:100px;font-weight:500;font-size:13px;cursor:pointer;color-scheme:light;forced-color-adjust:none;">
  Sign in
</button>
<button id="btnStayOut"
  style="background-color:#062e6f !important;color:#a8c7fa !important;border:none;padding:10px 16px;min-width:130px;border-radius:100px;font-weight:500;font-size:13px;cursor:pointer;color-scheme:light;forced-color-adjust:none;">
  Stay signed out
</button>
    </div>
  </div>

  <script>
    document.getElementById('btnToLogin').addEventListener('click', () => {
      window.location.href = "login.html";
    });

    document.getElementById('btnStayOut').addEventListener('click', () => {
      window.location.href = "main.html";
    });
  </script>
</body>
</html>
