<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chrome-window">

  <div class="titlebar">
    <div class="tab-list">
      <div class="tab">
        <img src="Asset/tab.png" alt="Favicon" class="tab-favicon-img">
        <span class="tab-title">New Tab</span>
        <div class="tab-close">✕</div>
      </div>
      <div class="tab-new" title="New tab">+</div>
    </div>
  </div>

  <div class="toolbar">
    <button class="nav-btn disabled" title="Back">
      <svg width="14" height="14" viewBox="0 0 14 14">
        <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" fill="none"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="nav-btn disabled" title="Forward">
      <svg width="14" height="14" viewBox="0 0 14 14">
        <path d="M5 2l5 5-5 5" stroke="currentColor" stroke-width="1.5" fill="none"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="nav-btn" title="Reload" id="reloadBtn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M12 7A5 5 0 1 1 9.5 2.5"/>
        <polyline points="9,0 9.5,2.5 12,2"/>
      </svg>
    </button>

    <div class="omnibox-wrap">
      <div class="omnibox" id="omniboxBar">
        <svg class="omnibox-g" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <input type="text" id="omniboxInput" placeholder="Search Google or type a URL" autocomplete="off">
      </div>
    </div>

    <div class="toolbar-right">
      <button class="nav-btn" title="Account">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </button>
      <button class="nav-btn" title="More">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="12" cy="5"  r="1.5"/>
          <circle cx="12" cy="12" r="1.5"/>
          <circle cx="12" cy="19" r="1.5"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="content">
    <div class="toplinks">
      <span class="toplink">Gmail</span>
      <span class="toplink">Images</span>
      
      <div class="toplink-icon" title="Google Labs">
        <img src="Asset/menu.png" alt="Labs" class="toplink-img">
      </div>
      
      <div class="toplink-icon" title="Google apps">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <rect x="3"  y="3"  width="4" height="4" rx="1"/>
          <rect x="10" y="3"  width="4" height="4" rx="1"/>
          <rect x="17" y="3"  width="4" height="4" rx="1"/>
          <rect x="3"  y="10" width="4" height="4" rx="1"/>
          <rect x="10" y="10" width="4" height="4" rx="1"/>
          <rect x="17" y="10" width="4" height="4" rx="1"/>
          <rect x="3"  y="17" width="4" height="4" rx="1"/>
          <rect x="10" y="17" width="4" height="4" rx="1"/>
          <rect x="17" y="17" width="4" height="4" rx="1"/>
        </svg>
      </div>
    </div>

    <div class="google-logo">
      <img src="Asset/google.png" alt="Google">
    </div>

    <div class="search-wrap">
      <div class="search-bar" id="mainSearchBar">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="11" cy="11" r="7"/>
          <line x1="16.5" y1="16.5" x2="22" y2="22"/>
        </svg>
        <input type="text" id="mainSearch" placeholder="Search Google or type a URL" autocomplete="off">
        <div class="search-action" title="Search by voice">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="9" y="2" width="6" height="12" rx="3"/>
            <path d="M5 11a7 7 0 0 0 14 0"/>
            <line x1="12" y1="18" x2="12" y2="22"/>
          </svg>
        </div>
        <div class="search-action" title="Search by image">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </div>
        <div class="ai-mode-btn" id="aiModeBtn">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M8 1l1.5 4H14l-3.5 2.5 1.5 4L8 9 4 11.5l1.5-4L2 5h4.5Z"/>
          </svg>
          AI Mode
        </div>
      </div>
      <div class="suggestions" id="suggestions"></div>
    </div>

    <div class="shortcuts">
      <div class="shortcut" id="youtubeBtn">
        <div class="shortcut-icon">
          <img src="Asset/yt.webp" alt="YouTube">
        </div>
        <span class="shortcut-label">YouTube</span>
      </div>
      <div class="shortcut" id="addShortcut">
        <div class="shortcut-icon">
          <span class="add-icon">+</span>
        </div>
        <span class="shortcut-label">Add shortcut</span>
      </div>
    </div>

  </div>
  
  <button class="customize-btn" id="customizeBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
    </svg>
    Customize Chrome
  </button>

</div>

<script src="script.js"></script>
</body>
</html>
